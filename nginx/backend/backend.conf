# ================================================================
#  NexusDB — BACKEND Nginx (Internal ALB Reverse Proxy → Gunicorn)
#  Role   : Runs on each backend EC2 instance behind the Internal ALB.
#            Receives traffic from the Internal ALB (port 80) and
#            proxies to local Gunicorn/Flask process (port 5000).
#  Path   : /etc/nginx/conf.d/backend.conf
# ================================================================

# ── Upstream = local Gunicorn ─────────────────────────────────────
upstream flask_gunicorn {
    server 127.0.0.1:5000 fail_timeout=5s max_fails=3;
    keepalive 32;
}

# ── Main server — listens on port 80 (Internal ALB target) ───────
server {
    listen       80;
    server_name  _;                  # Internal; matches any hostname

    # ── Logging ──────────────────────────────────────────────────
    access_log  /var/log/nginx/backend_access.log combined buffer=16k;
    error_log   /var/log/nginx/backend_error.log  warn;

    client_max_body_size    10m;
    client_body_buffer_size 128k;

    # ── Health check — fast, no upstream needed ───────────────────
    location = /health {
        proxy_pass         http://flask_gunicorn/health;
        proxy_set_header   Host $host;
        proxy_read_timeout 3s;
        access_log         off;
    }

    location = /health/ready {
        proxy_pass         http://flask_gunicorn/health/ready;
        proxy_set_header   Host $host;
        proxy_read_timeout 5s;
        access_log         off;
    }

    location = /health/live {
        proxy_pass         http://flask_gunicorn/health/live;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── API routes ────────────────────────────────────────────────
    location /api/ {
        proxy_pass          http://flask_gunicorn;
        proxy_http_version  1.1;
        proxy_set_header    Connection        "";
        proxy_set_header    Host              $http_host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $http_x_forwarded_proto;

        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
    }

    # ── All other routes ──────────────────────────────────────────
    location / {
        proxy_pass          http://flask_gunicorn;
        proxy_http_version  1.1;
        proxy_set_header    Connection        "";
        proxy_set_header    Host              $http_host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $http_x_forwarded_proto;

        proxy_connect_timeout  5s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
        proxy_intercept_errors off;
    }

    # ── Deny dot-files ────────────────────────────────────────────
    location ~ /\. { deny all; access_log off; log_not_found off; }
}
