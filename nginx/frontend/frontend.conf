# ================================================================
#  NexusDB — FRONTEND Nginx (External ALB Reverse Proxy)
#  Role   : Accepts public HTTPS traffic from External ALB,
#            forwards all /api/ and app requests to the
#            Internal ALB DNS name via reverse proxy.
#  Path   : /etc/nginx/conf.d/frontend.conf
# ================================================================

# ── Upstream = Internal ALB DNS ──────────────────────────────────
# Replace <INTERNAL_ALB_DNS> with your actual AWS Internal ALB
# DNS name: e.g. internal-backend-alb-123456.us-east-1.elb.amazonaws.com
upstream backend_internal_alb {
    # Internal ALB forwards to Flask backend instances (port 5000)
    server <INTERNAL_ALB_DNS>:80 fail_timeout=5s max_fails=3;

    keepalive 64;
}

# ── Rate limit zones ─────────────────────────────────────────────
limit_req_zone  $binary_remote_addr  zone=api_limit:10m  rate=30r/s;
limit_req_zone  $binary_remote_addr  zone=app_limit:10m  rate=10r/s;

# ── HTTP → HTTPS redirect ────────────────────────────────────────
server {
    listen      80;
    server_name _;                          # catch-all; tighten in prod
    return 301  https://$host$request_uri;
}

# ── Main HTTPS server ────────────────────────────────────────────
server {
    listen       443 ssl http2;
    server_name  app.yourdomain.com;        # ← change to your domain

    # TLS — issued by ACM (cert lives on the External ALB in AWS,
    # but keep a self-signed cert here for direct-to-instance health checks)
    ssl_certificate      /etc/ssl/certs/server.crt;
    ssl_certificate_key  /etc/ssl/private/server.key;
    ssl_protocols        TLSv1.2 TLSv1.3;
    ssl_ciphers          HIGH:!aNULL:!MD5;
    ssl_session_cache    shared:SSL:10m;
    ssl_session_timeout  10m;

    # ── Security headers ─────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"               always;
    add_header X-Content-Type-Options   "nosniff"                  always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=()"           always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Logging ───────────────────────────────────────────────────
    access_log  /var/log/nginx/nexusdb_access.log combined buffer=16k flush=5s;
    error_log   /var/log/nginx/nexusdb_error.log  warn;

    # ── Static assets with caching ───────────────────────────────
    location ~* \.(css|js|ico|png|jpg|jpeg|svg|woff2?)$ {
        proxy_pass          http://backend_internal_alb;
        proxy_cache_valid   200 1d;
        add_header          Cache-Control "public, max-age=86400, immutable";
        proxy_set_header    Host $host;
    }

    # ── API routes — stricter rate limit ─────────────────────────
    location /api/ {
        limit_req           zone=api_limit burst=60 nodelay;

        proxy_pass          http://backend_internal_alb;
        proxy_http_version  1.1;
        proxy_set_header    Connection         "";
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;

        proxy_connect_timeout  5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }

    # ── Health check passthrough (used by External ALB) ──────────
    location /health {
        proxy_pass         http://backend_internal_alb/health;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── All other routes → Flask app ─────────────────────────────
    location / {
        limit_req           zone=app_limit burst=20 nodelay;

        proxy_pass          http://backend_internal_alb;
        proxy_http_version  1.1;
        proxy_set_header    Connection         "";
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;

        proxy_connect_timeout  5s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        # Pass through status codes
        proxy_intercept_errors off;
    }

    # ── Custom error pages ───────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
